name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: SemVer component to bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Tag and publish release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          LATEST=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST"
          NEW_VERSION=$(npx --yes semver@7 -i "${{ inputs.bump }}" "${LATEST#v}")
          NEW_TAG="v${NEW_VERSION}"
          echo "New tag: $NEW_TAG"
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists" >&2
            exit 1
          fi
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: gh release create "$NEW_TAG" --title "$NEW_TAG" --generate-notes

      # Workflows triggered by GITHUB_TOKEN don't fire downstream `push`
      # events, so dispatch the ECR build explicitly against the new tag.
      - name: Trigger ECR build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: gh workflow run ecr-dggiscord-prod.yml --ref "$NEW_TAG"
